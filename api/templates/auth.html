<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rubis Intelligence — Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        .container {
            display: flex;
            width: 900px;
            min-height: 580px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5);
        }

        /* LEFT PANEL */
        .left-panel {
            width: 45%;
            background: linear-gradient(135deg, #e63946, #c1121f);
            padding: 50px 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .brand h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .brand p {
            font-size: 13px;
            opacity: 0.8;
            margin-top: 5px;
        }

        .system-info h2 {
            font-size: 20px;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .feature {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            font-size: 13px;
            opacity: 0.9;
        }

        .feature-icon {
            width: 30px;
            height: 30px;
            background: rgba(255,255,255,0.2);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .chatbot-btn {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: #fff;
            padding: 12px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            width: 100%;
        }

        .chatbot-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        /* RIGHT PANEL */
        .right-panel {
            width: 55%;
            background: #fff;
            padding: 50px 45px;
            color: #333;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .tabs {
            display: flex;
            gap: 0;
            margin-bottom: 30px;
            border-bottom: 2px solid #eee;
        }

        .tab {
            padding: 10px 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: #999;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all 0.2s;
        }

        .tab.active {
            color: #e63946;
            border-bottom-color: #e63946;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #666;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1.5px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            color: #333;
            transition: border-color 0.2s;
            outline: none;
        }

        .form-group input:focus {
            border-color: #e63946;
        }

        .btn-primary {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #e63946, #c1121f);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 5px;
        }

        .btn-primary:hover { opacity: 0.9; }

        .error-msg {
            background: #fff5f5;
            color: #e63946;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 15px;
            display: none;
            border: 1px solid #fecdd3;
        }

        .success-msg {
            background: #f0fdf4;
            color: #16a34a;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 15px;
            display: none;
            border: 1px solid #bbf7d0;
        }

        .forgot-link {
            text-align: right;
            margin-top: -10px;
            margin-bottom: 15px;
        }

        .forgot-link a {
            font-size: 12px;
            color: #e63946;
            text-decoration: none;
        }

        /* CHATBOT */
        .chatbot-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .chatbot-overlay.active { display: flex; }

        .chatbot-window {
            background: #fff;
            border-radius: 20px;
            width: 420px;
            max-height: 600px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .chatbot-header {
            background: linear-gradient(135deg, #e63946, #c1121f);
            padding: 20px 25px;
            color: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chatbot-header h3 { font-size: 16px; }
        .chatbot-header p { font-size: 12px; opacity: 0.8; }

        .close-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: #fff;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
        }

        .chatbot-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
        }

        .message.user { flex-direction: row-reverse; }

        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .bot-avatar { background: #e63946; color: #fff; }
        .user-avatar { background: #333; color: #fff; }

        .message-bubble {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 13px;
            line-height: 1.5;
        }

        .bot-bubble {
            background: #fff;
            color: #333;
            border: 1px solid #e0e0e0;
            border-radius: 12px 12px 12px 0;
        }

        .user-bubble {
            background: #e63946;
            color: #fff;
            border-radius: 12px 12px 0 12px;
        }

        .quick-replies {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
        }

        .quick-reply {
            background: #fff;
            border: 1px solid #e63946;
            color: #e63946;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quick-reply:hover {
            background: #e63946;
            color: #fff;
        }

        .chatbot-input {
            padding: 15px 20px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
            background: #fff;
        }

        .chatbot-input input {
            flex: 1;
            padding: 10px 15px;
            border: 1.5px solid #e0e0e0;
            border-radius: 25px;
            font-size: 13px;
            outline: none;
        }

        .chatbot-input input:focus { border-color: #e63946; }

        .send-btn {
            background: #e63946;
            border: none;
            color: #fff;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
        }

        .typing {
            display: flex;
            gap: 4px;
            padding: 10px 14px;
            background: #fff;
            border-radius: 12px;
            border: 1px solid #e0e0e0;
            width: fit-content;
        }

        .typing span {
            width: 6px;
            height: 6px;
            background: #999;
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }

        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <!-- LEFT PANEL -->
    <div class="left-panel">
        <div class="brand">
            <h1>🔴 Retail Intelligence System</h1>
            <p>Retail Analytics & Intelligence Platform</p>
        </div>

        <div class="system-info">
            <h2>What this system does</h2>
            <div class="feature">
                <div class="feature-icon">📊</div>
                <span>Live KPI tracking across 5 branches</span>
            </div>
            <div class="feature">
                <div class="feature-icon">📦</div>
                <span>Product intelligence & recommendations</span>
            </div>
            <div class="feature">
                <div class="feature-icon">🔄</div>
                <span>Daily automated pipeline at 6AM</span>
            </div>
        </div>

        <button class="chatbot-btn" onclick="openChatbot()">
            💬 Ask how the system works
        </button>
    </div>

    <!-- RIGHT PANEL -->
    <div class="right-panel">
        <div class="tabs">
            <div class="tab active" onclick="switchTab('login')">Sign In</div>
            <div class="tab" onclick="switchTab('register')">Register</div>
        </div>

        <div id="error-msg" class="error-msg"></div>
        <div id="success-msg" class="success-msg"></div>

        <!-- LOGIN FORM -->
        <div id="login-form">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="login-email" placeholder="you@rubiskenya.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login-password" placeholder="Enter your password">
            </div>
            <div class="forgot-link">
                <a href="#" onclick="switchTab('forgot')">Forgot password?</a>
            </div>
            <button class="btn-primary" onclick="handleLogin()">Sign In</button>
        </div>

        <!-- REGISTER FORM -->
        <div id="register-form" class="hidden">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="reg-name" placeholder="Your full name">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="reg-email" placeholder="you@rubiskenya.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="reg-password" placeholder="Min 8 characters">
            </div>
            <button class="btn-primary" onclick="handleRegister()">Create Account</button>
        </div>

        <!-- FORGOT PASSWORD FORM -->
        <div id="forgot-form" class="hidden">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="forgot-email" placeholder="you@rubiskenya.com">
            </div>
            <button class="btn-primary" onclick="handleForgot()">Send Reset Link</button>
            <p style="text-align:center;margin-top:15px;font-size:13px;color:#999">
                <a href="#" onclick="switchTab('login')" style="color:#e63946">Back to login</a>
            </p>
        </div>
    </div>
</div>

<!-- CHATBOT -->
<div class="chatbot-overlay" id="chatbot-overlay" onclick="closeChatbotOutside(event)">
    <div class="chatbot-window">
        <div class="chatbot-header">
            <div>
                <h3>🤖 Nuru</h3>
                <p>Ask me anything about the system</p>
            </div>
            <button class="close-btn" onclick="closeChatbot()">✕</button>
        </div>
        <div class="chatbot-messages" id="chatbot-messages"></div>
        <div class="chatbot-input">
            <input type="text" id="chat-input" placeholder="Ask a question..."
                   onkeypress="if(event.key==='Enter') sendMessage()">
            <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>
</div>

<script>
const API_URL = 'http://localhost:8000';

// ─────────────────────────────────────────
// TAB SWITCHING
// ─────────────────────────────────────────
function switchTab(tab) {
    document.getElementById('login-form').classList.add('hidden');
    document.getElementById('register-form').classList.add('hidden');
    document.getElementById('forgot-form').classList.add('hidden');
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));

    if (tab === 'login') {
        document.getElementById('login-form').classList.remove('hidden');
        document.querySelectorAll('.tab')[0].classList.add('active');
    } else if (tab === 'register') {
        document.getElementById('register-form').classList.remove('hidden');
        document.querySelectorAll('.tab')[1].classList.add('active');
    } else if (tab === 'forgot') {
        document.getElementById('forgot-form').classList.remove('hidden');
    }
    clearMessages();
}

function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('success-msg').style.display = 'none';
}

function showSuccess(msg) {
    const el = document.getElementById('success-msg');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('error-msg').style.display = 'none';
}

function clearMessages() {
    document.getElementById('error-msg').style.display = 'none';
    document.getElementById('success-msg').style.display = 'none';
}

// ─────────────────────────────────────────
// AUTH HANDLERS
// ─────────────────────────────────────────
async function handleLogin() {
    const email = document.getElementById('login-email').value;
    const password = document.getElementById('login-password').value;

    if (!email || !password) return showError('Please fill in all fields.');

    const formData = new FormData();
    formData.append('username', email);
    formData.append('password', password);

    try {
        const res = await fetch(`${API_URL}/auth/login`, {
            method: 'POST',
            body: formData
        });
        const data = await res.json();

        if (res.ok) {
            localStorage.setItem('rubis_token', data.access_token);
            showSuccess('Login successful! Redirecting...');
            setTimeout(() => window.location.href = '/dashboard', 1500);
        } else {
            showError(data.detail || 'Login failed.');
        }
    } catch (e) {
        showError('Connection error. Please try again.');
    }
}

async function handleRegister() {
    const name = document.getElementById('reg-name').value;
    const email = document.getElementById('reg-email').value;
    const password = document.getElementById('reg-password').value;

    if (!name || !email || !password) return showError('Please fill in all fields.');
    if (password.length < 8) return showError('Password must be at least 8 characters.');

    try {
        const res = await fetch(`${API_URL}/auth/register`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({email, password, full_name: name})
        });
        const data = await res.json();

        if (res.ok) {
            showSuccess('Account created! Please check your email to verify.');
            switchTab('login');
        } else {
            showError(data.detail || 'Registration failed.');
        }
    } catch (e) {
        showError('Connection error. Please try again.');
    }
}

async function handleForgot() {
    const email = document.getElementById('forgot-email').value;
    if (!email) return showError('Please enter your email.');

    try {
        const res = await fetch(`${API_URL}/auth/forgot-password?email=${email}`, {
            method: 'POST'
        });
        showSuccess('If that email exists, a reset link has been sent.');
    } catch (e) {
        showError('Connection error. Please try again.');
    }
}

// ─────────────────────────────────────────
// CHATBOT
// ─────────────────────────────────────────
const knowledgeBase = {
    "what is retail intelligence system": "Retail Intelligence system is a retail analytics platform built for mid-size to small retail stores in Kenya. It automatically extracts POS data from different branches daily, cleans it, loads it into a database, and runs ML models to detect anomalies, predict stockouts, and forecast revenue.",
    "how does it work": "The system runs a daily pipeline at 6AM Nairobi time. It gets data from the POS system, analyses it and represents anomaly detection, stockout prediction, and revenue forecasting results. The insights are then accessible via a web dashboard.",
    "what branches": "The system covers various Retail branches: Thome, Membley, Jogoo Road, Kingo, and Tigoni.",
    "how to login": "Enter your registered email and password on the Sign In tab. If you don't have an account, click Register to create one. After registering, verify your email before logging in. If you forget your password, use the Forgot password link to receive a reset link via email.",
    "default": "I can answer questions about the system. Try asking: 'How does it work?', 'What branches are covered?', 'What are the top products?', or 'How do I login?'"
};

function getBotResponse(input) {
    const lower = input.toLowerCase();
    for (const [key, value] of Object.entries(knowledgeBase)) {
        if (lower.includes(key) || key.split(' ').some(w => w.length > 4 && lower.includes(w))) {
            return value;
        }
    }
    return knowledgeBase["default"];
}

function openChatbot() {
    document.getElementById('chatbot-overlay').classList.add('active');
    if (document.getElementById('chatbot-messages').children.length === 0) {
        setTimeout(() => {
            addBotMessage("👋 Hi! I'm Nuru. I can explain what this system does and how it works.", [
                "How does it work?",
                "What branches?",
                "Top products"
            ]);
        }, 300);
    }
}

function closeChatbot() {
    document.getElementById('chatbot-overlay').classList.remove('active');
}

function closeChatbotOutside(e) {
    if (e.target === document.getElementById('chatbot-overlay')) closeChatbot();
}

function addBotMessage(text, quickReplies = []) {
    const messages = document.getElementById('chatbot-messages');
    const div = document.createElement('div');
    div.className = 'message';
    div.innerHTML = `
        <div class="message-avatar bot-avatar">🤖</div>
        <div>
            <div class="message-bubble bot-bubble">${text}</div>
            ${quickReplies.length ? `<div class="quick-replies">${quickReplies.map(r =>
                `<button class="quick-reply" onclick="quickReply('${r}')">${r}</button>`
            ).join('')}</div>` : ''}
        </div>
    `;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
}

function addUserMessage(text) {
    const messages = document.getElementById('chatbot-messages');
    const div = document.createElement('div');
    div.className = 'message user';
    div.innerHTML = `
        <div class="message-avatar user-avatar">👤</div>
        <div class="message-bubble user-bubble">${text}</div>
    `;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
}

function addTyping() {
    const messages = document.getElementById('chatbot-messages');
    const div = document.createElement('div');
    div.className = 'message';
    div.id = 'typing-indicator';
    div.innerHTML = `
        <div class="message-avatar bot-avatar">🤖</div>
        <div class="typing"><span></span><span></span><span></span></div>
    `;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
}

function removeTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
}

function sendMessage() {
    const input = document.getElementById('chat-input');
    const text = input.value.trim();
    if (!text) return;

    addUserMessage(text);
    input.value = '';
    addTyping();

    setTimeout(() => {
        removeTyping();
        const response = getBotResponse(text);
        addBotMessage(response);
    }, 800);
}

function quickReply(text) {
    addUserMessage(text);
    addTyping();
    setTimeout(() => {
        removeTyping();
        addBotMessage(getBotResponse(text));
    }, 600);
}
</script>
</body>
</html>
